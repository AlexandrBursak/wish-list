version: "3.8"

services:
  wishlist-db:
    image: postgres:18-alpine
    container_name: wishlist-db
    environment:
      POSTGRES_DB: wishlist
      POSTGRES_USER: wishlist
      POSTGRES_PASSWORD: wishlist
    ports:
      - "5433:5432"
    volumes:
      - wishlist-pgdata:/var/lib/postgresql
    restart: unless-stopped

  wishlist-app:
    build: .
    container_name: wishlist-app
    ports:
      - "3010:3001"
    depends_on:
      - wishlist-db
    restart: unless-stopped

volumes:
  wishlist-pgdata:
